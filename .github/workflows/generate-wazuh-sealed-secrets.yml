name: Generate Wazuh SealedSecrets

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeseal
        env:
          KUBESEAL_VERSION: "0.32.2"
        run: |
          curl -sSLo kubeseal.tar.gz "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
          tar -xzf kubeseal.tar.gz kubeseal
          sudo install -m 0755 kubeseal /usr/local/bin/kubeseal

      - name: Install Python dependencies
        run: python3 -m pip install bcrypt==4.2.1

      - name: Write SealedSecrets public certificate
        env:
          SEALED_SECRETS_PUBLIC_CERT: ${{ secrets.SEALED_SECRETS_PUBLIC_CERT }}
        run: |
          test -n "$SEALED_SECRETS_PUBLIC_CERT"
          printf '%s\n' "$SEALED_SECRETS_PUBLIC_CERT" > /tmp/sealed-secrets-public-cert.pem

      - name: Generate SealedSecrets
        env:
          KUBESEAL_CERT: /tmp/sealed-secrets-public-cert.pem
          WAZUH_API_USERNAME: ${{ secrets.WAZUH_API_USERNAME }}
          WAZUH_API_PASSWORD: ${{ secrets.WAZUH_API_PASSWORD }}
          WAZUH_AUTHD_PASS: ${{ secrets.WAZUH_AUTHD_PASS }}
          WAZUH_CLUSTER_KEY: ${{ secrets.WAZUH_CLUSTER_KEY }}
          DASHBOARD_USERNAME: ${{ secrets.DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          INDEXER_USERNAME: ${{ secrets.INDEXER_USERNAME }}
          INDEXER_PASSWORD: ${{ secrets.INDEXER_PASSWORD }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: bash scripts/seal-wazuh-secrets.sh clusters/production/wazuh/secrets/sealed

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/wazuh-sealed-secrets
          title: "Generate Wazuh SealedSecrets"
          commit-message: "Generate Wazuh SealedSecrets"
          body: |
            Generated encrypted SealedSecret manifests for Wazuh.
            If OTX_API_KEY was supplied, the PR also includes the encrypted AlienVault OTX API Secret.
            Plaintext secret values were read from GitHub Actions secrets and were not committed.
            The Wazuh indexer bcrypt hashes were also updated to match the supplied indexer and dashboard passwords.
