name: Generate SOC Platform SealedSecrets

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeseal
        env:
          KUBESEAL_VERSION: "0.32.2"
        run: |
          curl -sSLo kubeseal.tar.gz "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
          tar -xzf kubeseal.tar.gz kubeseal
          sudo install -m 0755 kubeseal /usr/local/bin/kubeseal

      - name: Write SealedSecrets public certificate
        env:
          SEALED_SECRETS_PUBLIC_CERT: ${{ secrets.SEALED_SECRETS_PUBLIC_CERT }}
        run: |
          test -n "$SEALED_SECRETS_PUBLIC_CERT"
          printf '%s\n' "$SEALED_SECRETS_PUBLIC_CERT" > /tmp/sealed-secrets-public-cert.pem

      - name: Generate SealedSecrets
        env:
          KUBESEAL_CERT: /tmp/sealed-secrets-public-cert.pem
          WAZUH_API_USERNAME: ${{ secrets.WAZUH_API_USERNAME }}
          WAZUH_API_PASSWORD: ${{ secrets.WAZUH_API_PASSWORD }}
          WAZUH_AUTHD_PASS: ${{ secrets.WAZUH_AUTHD_PASS }}
          WAZUH_CLUSTER_KEY: ${{ secrets.WAZUH_CLUSTER_KEY }}
          DASHBOARD_USERNAME: ${{ secrets.DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          INDEXER_USERNAME: ${{ secrets.INDEXER_USERNAME }}
          INDEXER_PASSWORD: ${{ secrets.INDEXER_PASSWORD }}
          SHUFFLE_OPENSEARCH_PASSWORD: ${{ secrets.SHUFFLE_OPENSEARCH_PASSWORD }}
          SHUFFLE_ENCRYPTION_MODIFIER: ${{ secrets.SHUFFLE_ENCRYPTION_MODIFIER }}
          SHUFFLE_DEFAULT_USERNAME: ${{ secrets.SHUFFLE_DEFAULT_USERNAME }}
          SHUFFLE_DEFAULT_PASSWORD: ${{ secrets.SHUFFLE_DEFAULT_PASSWORD }}
          SHUFFLE_DEFAULT_APIKEY: ${{ secrets.SHUFFLE_DEFAULT_APIKEY }}
          SHUFFLE_WEBHOOK_URL: ${{ secrets.SHUFFLE_WEBHOOK_URL }}
          DFIR_IRIS_POSTGRES_PASSWORD: ${{ secrets.DFIR_IRIS_POSTGRES_PASSWORD }}
          DFIR_IRIS_POSTGRES_ADMIN_USER: ${{ secrets.DFIR_IRIS_POSTGRES_ADMIN_USER }}
          DFIR_IRIS_POSTGRES_ADMIN_PASSWORD: ${{ secrets.DFIR_IRIS_POSTGRES_ADMIN_PASSWORD }}
          DFIR_IRIS_SECRET_KEY: ${{ secrets.DFIR_IRIS_SECRET_KEY }}
          DFIR_IRIS_SECURITY_PASSWORD_SALT: ${{ secrets.DFIR_IRIS_SECURITY_PASSWORD_SALT }}
          DFIR_IRIS_ADMIN_PASSWORD: ${{ secrets.DFIR_IRIS_ADMIN_PASSWORD }}
          DFIR_IRIS_ADMIN_API_KEY: ${{ secrets.DFIR_IRIS_ADMIN_API_KEY }}
        run: bash scripts/seal-wazuh-secrets.sh clusters/production/wazuh/secrets/sealed

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/soc-platform-sealed-secrets
          title: "Generate SOC platform SealedSecrets"
          commit-message: "Generate SOC platform SealedSecrets"
          body: |
            Generated encrypted SealedSecret manifests for Wazuh, Shuffle, and DFIR-IRIS.
            If SHUFFLE_WEBHOOK_URL was supplied, the PR also includes the encrypted Wazuh-to-Shuffle webhook Secret.
            Plaintext secret values were read from GitHub Actions secrets and were not committed.
            The Wazuh indexer bcrypt hashes were also updated to match the supplied indexer and dashboard passwords.
