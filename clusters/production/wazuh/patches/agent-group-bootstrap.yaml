apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: wazuh
spec:
  template:
    spec:
      initContainers:
        - name: bootstrap-agent-groups
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /shared/windows-endpoints /shared/suricata-sensors
              cp /group-configs/windows-endpoints-agent.conf /shared/windows-endpoints/agent.conf
              cp /group-configs/suricata-sensors-agent.conf /shared/suricata-sensors/agent.conf
              chmod 0640 /shared/windows-endpoints/agent.conf /shared/suricata-sensors/agent.conf
              chown -R 101:101 /shared/windows-endpoints /shared/suricata-sensors || true
              cp /integration-scripts/custom-alienvault-secret /integrations/custom-alienvault-secret
              chmod 0750 /integrations/custom-alienvault-secret
              chown 0:101 /integrations/custom-alienvault-secret || true
          volumeMounts:
            - name: wazuh-manager-master
              mountPath: /shared
              subPath: wazuh/var/ossec/etc/shared
            - name: wazuh-manager-master
              mountPath: /integrations
              subPath: wazuh/var/ossec/integrations
            - name: agent-group-configs
              mountPath: /group-configs
              readOnly: true
            - name: wazuh-manager-integrations
              mountPath: /integration-scripts
              readOnly: true
      containers:
        - name: wazuh-manager
          volumeMounts:
            - name: wazuh-otx-api-key
              mountPath: /var/ossec/secrets/otx
              readOnly: true
      volumes:
        - name: agent-group-configs
          configMap:
            name: wazuh-agent-group-configs
        - name: wazuh-manager-integrations
          configMap:
            name: wazuh-manager-integrations
            defaultMode: 0550
        - name: wazuh-otx-api-key
          secret:
            secretName: wazuh-otx-api-key
            optional: true
