# helm-release.yaml
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: wazuh
  namespace: wazuh
spec:
  interval: 10m
  dependsOn:
    - name: wazuh
      kind: Namespace
      apiVersion: v1
  targetNamespace: wazuh
  chart:
    spec:
      chart: wazuh
      version: "4.14.1"
      sourceRef:
        kind: HelmRepository
        name: wazuh
        namespace: wazuh
  valuesFrom:
    - kind: ConfigMap
      name: wazuh-values
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3