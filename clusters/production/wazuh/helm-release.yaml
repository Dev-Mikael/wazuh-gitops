# helm-release.yaml
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: wazuh
  namespace: wazuh
spec:
  interval: 10m
  dependsOn:
    - name: wazuh
      kind: Namespace
      apiVersion: v1
  targetNamespace: wazuh
  chart:
    spec:
      chart: wazuh
      version: "4.14.1"
      sourceRef:
        kind: HelmRepository
        name: wazuh
        namespace: wazuh
  values:
    indexer:
      replicas: 1
      storage:
        storageClassName: default
        size: 50Gi
    manager:
      storage:
        storageClassName: default
        size: 20Gi
      service:
        type: ClusterIP
    dashboard:
      service:
        type: ClusterIP
      resources:
        requests:
          memory: "4Gi"
          cpu: "1000m"
        limits:
          memory: "8Gi"
          cpu: "2000m"
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3