apiVersion: v1
kind: Service
metadata:
  name: dfir-iris-postgres
  namespace: dfir-iris
spec:
  type: ClusterIP
  selector:
    app: dfir-iris-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dfir-iris-postgres
  namespace: dfir-iris
spec:
  serviceName: dfir-iris-postgres
  replicas: 1
  selector:
    matchLabels:
      app: dfir-iris-postgres
  template:
    metadata:
      labels:
        app: dfir-iris-postgres
    spec:
      containers:
        - name: postgres
          image: ghcr.io/dfir-iris/iriswebapp_db:v2.4.27
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: dfir-iris-config
            - secretRef:
                name: dfir-iris-secrets
          volumeMounts:
            - name: dfir-iris-postgres
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: dfir-iris-postgres
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: wazuh-storage
        resources:
          requests:
            storage: 20Gi
