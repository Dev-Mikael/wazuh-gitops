apiVersion: v1
kind: Service
metadata:
  name: dfir-iris-rabbitmq
  namespace: dfir-iris
spec:
  type: ClusterIP
  selector:
    app: dfir-iris-rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfir-iris-rabbitmq
  namespace: dfir-iris
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dfir-iris-rabbitmq
  template:
    metadata:
      labels:
        app: dfir-iris-rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
