apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/testing/aws/sealed-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  wait: true
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: sealed-secrets
      namespace: sealed-secrets
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wazuh
  namespace: flux-system
spec:
  dependsOn:
    - name: sealed-secrets
  interval: 10m
  path: ./clusters/testing/aws/wazuh
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 30m
  wait: true
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: wazuh-indexer
      namespace: wazuh
    - apiVersion: apps/v1
      kind: StatefulSet
      name: wazuh-manager-master
      namespace: wazuh
    - apiVersion: apps/v1
      kind: StatefulSet
      name: wazuh-manager-worker
      namespace: wazuh
    - apiVersion: apps/v1
      kind: Deployment
      name: wazuh-dashboard
      namespace: wazuh
