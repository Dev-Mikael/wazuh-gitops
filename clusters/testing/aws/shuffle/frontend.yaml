apiVersion: v1
kind: Service
metadata:
  name: shuffle-frontend
  namespace: shuffle
spec:
  type: ClusterIP
  selector:
    app: shuffle-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shuffle-frontend
  namespace: shuffle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shuffle-frontend
  template:
    metadata:
      labels:
        app: shuffle-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/shuffle/shuffle-frontend:latest
          ports:
            - name: http
              containerPort: 80
          env:
            - name: BACKEND_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: shuffle-config
                  key: BACKEND_HOSTNAME
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
